apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: postgreses.database.example.com
spec:
  group: database.example.com
  names:
    kind: Postgres
    plural: postgreses
    singular: postgres
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              image:
                type: string
                example: postgres:16
              replicas:
                type: integer
                minimum: 1
                default: 1
              storage:
                type: string
                example: 5Gi
              username:
                type: string
              password:
                type: string 
              database:
                type: string


                